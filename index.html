<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-gray-200">

  <!-- NAV -->
  <header class="bg-gray-950 border-b border-gray-800 p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Download Hub</h1>

    <nav class="space-x-6">
      <button onclick="showTab('downloads')">Downloads</button>
      <button onclick="showTab('executor')">Executors</button>
      <button onclick="showTab('upload')">Upload</button>
    </nav>
  </header>

  <!-- DOWNLOADS -->
  <section id="downloads" class="p-10">
    <h2 class="text-2xl font-bold mb-6">Downloads</h2>

    <div class="grid md:grid-cols-2 gap-6">

      <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
        <h3 class="font-bold mb-2">No downloads available</h3>
        <p class="text-gray-500 text-sm">This section is empty</p>

        <!-- dead UI button -->
        <button class="mt-4 bg-blue-600 px-4 py-2 rounded opacity-40 cursor-not-allowed">
          Download
        </button>
      </div>

    </div>
  </section>

  <!-- EXECUTOR STATUS -->
  <section id="executor" class="p-10 hidden">
    <h2 class="text-2xl font-bold mb-6">Executor Status</h2>

    <div id="statusList" class="grid md:grid-cols-2 gap-6"></div>
  </section>

  <!-- UPLOAD -->
  <section id="upload" class="p-10 hidden">

    <!-- LOCK -->
    <div id="lockScreen">
      <h2 class="text-2xl font-bold mb-4">Enter Password</h2>

      <input
        type="password"
        id="passwordInput"
        class="p-2 bg-gray-900 border border-gray-700 rounded"
        placeholder="Password"
      />

      <button onclick="checkPassword()" class="ml-2 bg-blue-600 px-4 py-2 rounded">
        Unlock
      </button>
    </div>

    <!-- UPLOAD UI (NON FUNCTIONAL) -->
    <div id="uploadContent" class="hidden mt-8 opacity-60">

      <h2 class="text-xl font-bold mb-4">Upload Executor</h2>

      <input
        type="text"
        placeholder="Executor name (UI only)"
        class="mb-3 p-2 w-full bg-gray-900 border border-gray-700 rounded"
      />

      <input type="file" class="mb-4" />

      <button class="bg-purple-700 px-4 py-2 rounded opacity-50 cursor-not-allowed">
        Upload
      </button>

    </div>
  </section>

<script>
  function showTab(tab) {
    document.getElementById('downloads').classList.add('hidden');
    document.getElementById('executor').classList.add('hidden');
    document.getElementById('upload').classList.add('hidden');

    document.getElementById(tab).classList.remove('hidden');

    if (tab === 'executor') {
      loadStatus();
    }
  }

  async function loadStatus() {
    const container = document.getElementById('statusList');
    container.innerHTML = '';

    let data;

    try {
      const res = await fetch('https://api.weao.xyz/status');
      data = await res.json();
    } catch {
      data = [
        { name: 'Executor X', status: 'working', updated: 'just now' },
        { name: 'Executor Y', status: 'down', updated: 'unknown' },
        { name: 'Executor Z', status: 'working', updated: 'recent' }
      ];
    }

    data.forEach(exec => {
      const color = exec.status === 'working'
        ? 'text-green-400'
        : 'text-red-400';

      const div = document.createElement('div');
      div.className = 'bg-gray-900 p-5 rounded-xl border border-gray-800';

      div.innerHTML = `
        <h3 class="text-lg font-bold">${exec.name}</h3>
        <p class="${color}">Status: ${exec.status}</p>
        <p class="text-gray-500 text-sm">Updated: ${exec.updated}</p>
      `;

      container.appendChild(div);
    });
  }

  function checkPassword() {
    const input = document.getElementById('passwordInput').value;

    if (input === 'iunnolovestea') {
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('uploadContent').classList.remove('hidden');
    }
  }

  // default load
  loadStatus();
</script>

</body>
</html>
