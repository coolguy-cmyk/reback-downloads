<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">MySite</h1>
    <nav class="space-x-4">
      <a href="#" class="hover:text-blue-500">Home</a>
      <a href="#" class="hover:text-blue-500">About</a>
      <a href="#" class="hover:text-blue-500">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="text-center py-20 bg-gradient-to-r from-blue-500 to-indigo-600 text-white">
    <h2 class="text-4xl font-bold mb-4">Welcome to My Website</h2>
    <p class="mb-6">A clean modern site built in one file</p>
    <button class="bg-white text-blue-600 px-6 py-2 rounded-xl font-semibold hover:bg-gray-200">Get Started</button>
  </section>

  <!-- Features -->
  <section class="p-10 grid md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-2xl shadow">
      <h3 class="font-bold text-lg mb-2">Fast</h3>
      <p>Lightweight and quick to load.</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow">
      <h3 class="font-bold text-lg mb-2">Simple</h3>
      <p>Easy to edit and customize.</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow">
      <h3 class="font-bold text-lg mb-2">Modern</h3>
      <p>Clean design using Tailwind.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center p-6 bg-white shadow-inner">
    <p>© 2026 MySite</p>
  </footer>

</body>
</html>
